plugins {
    id 'com.android.application'
}

android {
    namespace 'com.cpsa.tests'
    compileSdk 35

    defaultConfig {
        applicationId 'com.cpsa.tests'
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName '1.0.1'
    }

    signingConfigs {
        release {
            def storePath = System.getenv('CPSA_TESTS_KEYSTORE') ?: '../../signing/cpsa-tests-release.keystore'
            storeFile file(storePath)
            storePassword System.getenv('CPSA_TESTS_KEYSTORE_PASSWORD') ?: 'cpsatests'
            keyAlias System.getenv('CPSA_TESTS_KEY_ALIAS') ?: 'cpsa-tests'
            keyPassword System.getenv('CPSA_TESTS_KEY_PASSWORD') ?: 'cpsatests'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
